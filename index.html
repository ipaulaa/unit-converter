<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/style.css" />

    <title>Unit Converter</title>
  </head>
  <body>
    <div class="page">
      <main>
        <header>
          <h1>Metric/Imperial Unit Conversion</h1>
          <form>
            <input type="number" />
            <button type="submit">Convert</button>
          </form>
        </header>
        <div class="conversion-cards">
          <section>
            <h2>Length (Meter/Feet)</h2>
            <p>
              <span class="value">20</span> =
              <span class="feet-value">65.616</span> feet |
              <span class="value">20</span> feet =
              <span class="meters-value">6.096</span> meters
            </p>
          </section>
          <section>
            <h2>Volume (Liters/Gallons)</h2>
            <p>
              <span class="value">20</span> =
              <span class="gallons-value">5.284</span> gallons |
              <span class="value">20</span> feet =
              <span class="liters-value">75.708</span> liters
            </p>
          </section>
          <section>
            <h2>Mass (Kilograms/Pounds)</h2>
            <p>
              <span class="value">20</span> =
              <span class="pounds-value">44.092</span> pounds |
              <span class="value">20</span> feet =
              <span class="kilos-value">9.072</span>
            </p>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
